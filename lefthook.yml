# Refer for explanation to following link:
# https://lefthook.dev/configuration/

pre-commit:
  parallel: true
  jobs:
    - run: mise hook-oxfmt {staged_files}
      glob: '*.{js,jsx,ts,tsx,json,md,yml,yaml}'
      stage_fixed: true
    - run: mise hook-oxlint {staged_files}
      glob: '*.{js,jsx,ts,tsx}'
      stage_fixed: true
