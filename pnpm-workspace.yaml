packages:
  - .
  - docs

# WHY: Delay installs of newly published packages for 48 hours to reduce
# exposure to compromised releases before the ecosystem has time to react.
minimumReleaseAge: 2880

overrides:
  '@ungap/structured-clone': 1.3.1

allowBuilds:
  esbuild: false
  lefthook: false
  sharp: true
  unrs-resolver: false
